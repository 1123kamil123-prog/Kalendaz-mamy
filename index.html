<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalendarz Mamy - Rezerwacje 60zł</title>
<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;padding:20px}
h1{color:#d32f2f}
.kalendarz{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:800px;margin:20px auto}
.dzien{background:white;padding:15px;border-radius:8px;cursor:pointer;border:2px solid #ddd}
.dzien:hover{background:#ffe6e6}
.zajete{background:#ccc;cursor:not-allowed}
.cena{color:green;font-weight:bold;font-size:20px}
button{background:#d32f2f;color:white;padding:15px 30px;border:none;border-radius:8px;font-size:18px;cursor:pointer;margin-top:20px}
button:hover{background:#b71c1c}
</style>
</head>
<body>
<h1>🔥 Kalendarz Mamy - Rezerwacje 60zł 🔥</h1>
<p class="cena">Wybierz termin - Płatność 60zł</p>
<div class="kalendarz">
<div class="dzien">Pon 16.06<br>10:00</div>
<div class="dzien">Pon 16.06<br>14:00</div>
<div class="dzien zajete">Wt 17.06<br>ZAJĘTE</div>
<div class="dzien">Śr 18.06<br>11:00</div>
<div class="dzien">Śr 18.06<br>15:00</div>
<div class="dzien">Czw 19.06<br>10:00</div>
<div class="dzien">Pt 20.06<br>14:00</div>
</div>
<button onclick="alert('Rezerwacja przyjęta! Mama zadzwoni w celu płatności 60zł')">REZERWUJ TERAZ 60ZŁ</button>
<p>Bilgoraj, 2026 | Mama zarabia!</p>
</body>
</html>
